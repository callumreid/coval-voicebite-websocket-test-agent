app = "coval-voicebite-websocket-test-agent"
primary_region = "sjc"

[build]

[env]
  PUBLIC_BASE_URL = "https://coval-voicebite-websocket-test-agent.fly.dev"
  VOICEBITE_SAMPLE_RATE_HZ = "16000"
  VOICEBITE_CHANNELS = "1"
  VOICEBITE_ECHO_THRESHOLD_BYTES = "16000"
  VOICEBITE_RESPONSE_MODE = "canned_speech"
  VOICEBITE_CANNED_RESPONSE_LIMIT = "2"
  VOICEBITE_CANNED_RESPONSE_CHUNK_MS = "100"
  VOICEBITE_CANNED_TURN_SILENCE_MS = "900"
  VOICEBITE_SEND_CART_ON_CONNECT = "true"
  VOICEBITE_SEND_CART_AFTER_FIRST_ECHO = "false"
  VOICEBITE_SEND_SESSION_READY = "false"
  VOICEBITE_REQUIRE_AUTH = "false"
  VOICEBITE_CLOSE_AFTER_ECHOS = "0"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
